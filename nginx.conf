# =====================================================
# PROMEIA · 静态站点 nginx 配置
# 处理中文文件名 / 长缓存 / gzip / 视频字节范围请求
# =====================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # 字符集：让响应头声明 UTF-8，避免某些浏览器对中文文件名/内容的渲染问题
    charset utf-8;
    charset_types text/css text/plain text/xml application/javascript application/json image/svg+xml;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- gzip 压缩（文本类资源）----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;

    # ---------- 默认页 / SPA 友好回退 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 视频：支持 Range 请求（拖动 / 流式播放）----------
    location ~* \.(mp4|webm|ogg|mov)$ {
        mp4;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ---------- 图片：长缓存 ----------
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ---------- 字体：长缓存 ----------
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Access-Control-Allow-Origin *;
        access_log off;
    }

    # ---------- HTML：短缓存，便于发版生效 ----------
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # ---------- CSS / JS：中等缓存 ----------
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ---------- 安全头 ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 错误页 ----------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # 隐藏 nginx 版本
    server_tokens off;
}
